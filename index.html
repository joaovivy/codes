<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de filmes</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        h1.title {
            background-color: red;
            color: white;
            padding: 10px;
        }

        form {
            margin: 10px;
            padding: 10px;
            border: 1px solid rgba(0, 0, 0, 0.438);
            border-radius: 20px;
            display: flex;
        }

        form input {
            padding: 5px;
            border: none;
            outline: none;
            flex: 1;
        }

        form button {
            padding: 5px 10px;
            background-color: rgba(128, 128, 128, 0.418);
            color: black;
            border: none;
            border-radius: 10px;
        }

        form button:hover {
            background-color: red;
            color: white;
            cursor: pointer;
        }

        div.lista {
            margin-top: 10px;
            padding: 5px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        div.item {
            text-align: center;
            padding: 10px;
            width: 200px;
            border: 2px solid grey;
            margin: 5px;
            border-radius: 5px;
        }

        div.item:hover {
            background-color: red;
            cursor: pointer;
        }

        div.item img {
            width: 100%;
        }
    </style>
</head>
<body>
    <h1 class="title">Catálogo de Filmes</h1>
    <form>
        <input name="pesquisa" placeholder="Digite o nome do filme"/>
        <button>Pesquisar</button>
    </form>
    <div class="lista">
        <div class="item">
            <img src="https://m.media-amazon.com/images/M/MV5BMmU5NGJlMzAtMGNmOC00YjJjLTgyMzUtNjAyYmE4Njg5YWMyXkEyXkFqcGc@._V1_SX300.jpg"/>
            <h2>Batman Begins</h2>
        </div>
        <div class="item">
            <img src="https://m.media-amazon.com/images/M/MV5BZTJkYjdmYjYtOGMyNC00ZGU1LThkY2ItYTc1OTVlMmE2YWY1XkEyXkFqcGc@._V1_SX300.jpg"/>
            <h2>Batman v Superman: Dawn of Justice</h2>
        </div>
    </div> 
    <script src="js/script.js"></script> 
</body>
</html>
